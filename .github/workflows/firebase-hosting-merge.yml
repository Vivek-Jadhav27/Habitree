# This workflow is triggered on every push to your main branch.
# It automatically builds your Flutter web app and deploys it to your live Firebase Hosting site.

name: Deploy Flutter Web to Firebase Hosting (Merge)

on:
  push:
    branches:
      - main # Or 'master', depending on your default branch name

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Start of Flutter Web Build Steps ---
      # This section is your "build script" that prepares your Flutter app for the web.
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # IMPORTANT: Specify the Flutter version you are using.
          # Examples: '3.19.0', '3.16.5', or 'stable' for the latest stable version.
          flutter-version: 'stable'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Flutter Web
        # This command creates the web-ready files in the 'build/web' directory.
        # Use --release for an optimized production build.
        run: flutter build web --release
      # --- End of Flutter Web Build Steps ---

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HABITREE_563A5 }}' # This secret is automatically set up by `firebase init hosting:github`
          projectId: habitree-563a5
          # For merges to the main branch, we deploy directly to the live site.
          # No 'channelId' is specified here, so it deploys to the default hosting site.
