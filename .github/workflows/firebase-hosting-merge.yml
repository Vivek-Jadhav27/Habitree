name: Deploy Flutter Web to Firebase Hosting (Merge)

on:
  push:
    branches:
      - main # Or 'master', depending on your default branch

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout repo
      - uses: actions/checkout@v4
      - run: >-
          sudo snap install flutter --classic && flutter channel beta
      - name: Install FlutterFire CLI
        run: dart pub global activate flutterfire_cli
      - name: Restore Firebase config
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HABITREE_563A5 }}' > firebase_config.json
          dart pub global run flutterfire_cli configure \
            --project=habitree-563a5 \
            --platforms=web \
            --json-file=firebase_config.json \
            --out=lib/firebase_options.dart \
            --yes

      - name: Get Flutter dependencies
        run: flutter pub get
      # Build Flutter web app
      - name: Build Flutter Web
        run: flutter build web --release
        
      # # Setup Flutter (latest stable)
      # - name: Setup Flutter
      #   uses: subosito/flutter-action@v2
      #   with:
      #     flutter-version: 'stable'
      #     architecture: x64

      #     channel: 'stable'

      # # Install dependencies
      # - name: Get Flutter dependencies
      #   run: flutter pub get

      # # Build Flutter Web (release build for production)
      # - name: Build Flutter Web
      #   run: flutter build web --release

      # Deploy to Firebase Hosting (live site)
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HABITREE_563A5 }}'
          projectId: habitree-563a5
