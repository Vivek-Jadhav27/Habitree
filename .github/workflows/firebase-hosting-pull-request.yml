name: Deploy Flutter Web to Firebase Hosting (PR)

on:
  pull_request:

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      # Checkout repo
      - uses: actions/checkout@v4
      - run: >-
          sudo snap install flutter --classic && flutter channel beta && flutter
          config --enable-web && flutter build web
      # # Setup Flutter (latest stable)
      # - uses: subosito/flutter-action@v2
      #   with:
      #     flutter-version: 'stable'
      #     architecture: x64

      
      # # Install dependencies
      # - name: Run flutter pub get
      #   run: flutter pub get

      # # Build Flutter web app
      # - name: Build Web App
      #   run: flutter build web --release

      # Deploy to Firebase Hosting Preview Channel
      - name: Deploy to Firebase Hosting Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HABITREE_563A5 }}'
          projectId: habitree-563a5
          channelId: pr-${{ github.event.pull_request.number }}
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
